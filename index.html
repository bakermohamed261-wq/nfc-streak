<!DOCTYPE html>
<html>
<head>
    <title>NFC Streak</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: #e0e0e0; text-align: center; }
        .table-container { display: flex; justify-content: center; gap: 10px; margin-top: 50px; }
        .day-card { border: 2px solid #333; padding: 15px; border-radius: 8px; width: 80px; }
        .checked { background: #00ff88; color: #000; border-color: #00ff88; font-weight: bold; }
        h1 { color: #00ff88; }
    </style>
</head>
<body>

    <h1>🔥 WEEKLY STREAK</h1>
    <div class="table-container" id="streakTable">
        </div>

    <script>
       // 1. Get the current day (0-6) and the date of the year (e.g., 115)
const now = new Date();
const todayIndex = now.getDay();
const dayOfYear = Math.floor((now - new Date(now.getFullYear(), 0, 0)) / 86400000);

// 2. Load the saved data
let savedData = JSON.parse(localStorage.getItem('nfc_streak')) || [false, false, false, false, false, false, false];
let lastCheckInDay = localStorage.getItem('last_check_day') || 0;

// 3. THE RESET LOGIC: 
// If it's been more than 7 days since your last tap, OR if we've circled back to a Sunday
// we clear the board for a fresh start.
if (dayOfYear - lastCheckInDay >= 7 || (todayIndex === 0 && lastCheckInDay != dayOfYear)) {
    savedData = [false, false, false, false, false, false, false];
}

// 4. Mark today as checked and save the "Day of the Year"
savedData[todayIndex] = true;
localStorage.setItem('nfc_streak', JSON.stringify(savedData));
localStorage.setItem('last_check_day', dayOfYear);

// 5. Draw the table (This part stays the same)
const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
const table = document.getElementById('streakTable');
table.innerHTML = ""; // Clear the old table
days.forEach((day, index) => {
    let statusClass = savedData[index] ? 'day-card checked' : 'day-card';
    let checkMark = savedData[index] ? '✔' : '';
    table.innerHTML += `<div class="${statusClass}">${day}<br>${checkMark}</div>`;
});
    </script>

</body>
</html>
